# tinyproxy config for the egress wall. Default-deny: only hosts matching
# /etc/tinyproxy/allowlist.txt are reachable. The sandbox runner is forced
# through this proxy and has no direct internet route.

Port 8888
Listen 0.0.0.0
Timeout 600

# Who may USE the proxy. The proxy sits on an internal docker network, so
# "anyone who can reach it" is just our runner container — fine to allow.
Allow 0.0.0.0/0

# The wall: extended regexes, default DENY. CONNECT (HTTPS) is filtered on host.
Filter "/etc/tinyproxy/allowlist.txt"
FilterDefaultDeny Yes
FilterExtended On
FilterCaseSensitive Off

# Only allow CONNECT to 443 (and 80); no tunnelling to arbitrary ports.
ConnectPort 443
ConnectPort 80

# Keep logs quiet but present for the isolation audit.
LogLevel Notice
